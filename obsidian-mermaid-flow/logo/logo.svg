<svg width="256" height="256" viewBox="0 0 256 256" fill="none"
     xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <defs>
        <linearGradient id="bg" x1="40" y1="20" x2="210" y2="230"
                        gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#E8B05A"/>
            <stop offset="100%" stop-color="#A06BEA"/>
        </linearGradient>

        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="3"
                          flood-color="#6A4BA0"
                          flood-opacity="0.35"/>
        </filter>
    </defs>

    <!-- Rounded square background -->
    <rect x="12"
          y="12"
          width="232"
          height="232"
          rx="42"
          fill="url(#bg)"/>

    <!-- Logo -->
    <g filter="url(#shadow)"
       stroke="white"
       stroke-width="8"
       stroke-linecap="round"
       stroke-linejoin="round"
       fill="none">

        <!-- Top square -->
        <rect x="76"
              y="74"
              width="42"
              height="42"
              rx="10"/>

        <!-- Bottom square -->
        <rect x="128"
              y="126"
              width="42"
              height="42"
              rx="10"/>

        <!-- Connector -->
        <path d="
            M97 116
            V138
            C97 145 102 150 109 150
            H128
        "/>

    </g>

</svg>